ktor {
    deployment {
        port = 8080
        port = ${?PORT}
    }
    application {
        modules = [io.titlis.api.MainKt.module]
    }
}

titlis {
    database {
        url      = "jdbc:postgresql://localhost:5432/titlis"
        url      = ${?DATABASE_URL}
        user     = "titlis"
        user     = ${?DATABASE_USER}
        password = "titlis"
        password = ${?DATABASE_PASSWORD}
        pool {
            maxPoolSize       = 10
            maxPoolSize       = ${?DB_POOL_MAX}
            connectionTimeout = 30000
            idleTimeout       = 600000
        }
    }
    udp {
        port        = 8125
        port        = ${?TITLIS_UDP_PORT}
        bufferSize  = 65507   # max UDP payload IPv4
        workers     = 4       # coroutines processando a fila
        queueSize   = 10000   # buffer interno antes de processar
    }
    auth {
        appEnv               = "local"
        appEnv               = ${?TITLIS_APP_ENV}
        issuer               = "titlis-local"
        issuer               = ${?TITLIS_AUTH_ISSUER}
        audience             = "titlis-ui"
        audience             = ${?TITLIS_AUTH_AUDIENCE}
        accessTokenSecret    = "titlis-dev-secret-change-me"
        accessTokenSecret    = ${?TITLIS_AUTH_ACCESS_TOKEN_SECRET}
        accessTokenTtlMinutes = 720
        accessTokenTtlMinutes = ${?TITLIS_AUTH_ACCESS_TOKEN_TTL_MINUTES}
        oktaIssuer           = ${?TITLIS_OKTA_ISSUER}
        oktaAudience         = ${?TITLIS_OKTA_AUDIENCE}
        oktaClientId         = ${?TITLIS_OKTA_CLIENT_ID}
        authMode             = "mixed"
        authMode             = ${?TITLIS_AUTH_MODE}
        devBypassEnabled     = true
        devBypassEnabled     = ${?TITLIS_DEV_BYPASS_ENABLED}
        devTenantId          = 1
        devTenantId          = ${?TITLIS_DEV_TENANT_ID}
        devUserEmail         = "dev@titlis.local"
        devUserEmail         = ${?TITLIS_DEV_USER_EMAIL}
        devRoles             = "Jeitto Confia - Admin"
        devRoles             = ${?TITLIS_DEV_ROLES}
    }
}
